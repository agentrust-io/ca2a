# Cross-operator delegation example — runtime config.
#
# Software-only and advisory: this config selects no hardware attestation
# backend and does not enforce anything at runtime. It exists so the example
# validates with `ca2a validate-config`. See README.md for what is real vs
# software-asserted in this example.
attestation:
  provider: software-only     # auto | tpm | sev-snp | tdx | opaque | software-only
  enforcement_mode: advisory  # enforcing | advisory | silent

max_delegation_depth: 8
policy_bundle_path: policy.cedar
listen_addr: "0.0.0.0:8443"
