name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '30 4 * * 1'
  push:
    branches:
      - main

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    # Scorecard requires a public repo. Skip (neutral) while private; this runs
    # for real once the repo is made public at launch.
    if: github.event.repository.visibility == 'public'
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # The repo is public; publish results to the OpenSSF Scorecard API so
          # the README badge resolves.
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
